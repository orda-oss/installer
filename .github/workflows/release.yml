name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

jobs:
    build:
        name: Build ${{ matrix.arch }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - target: x86_64-unknown-linux-musl
                      arch: amd64
                    - target: aarch64-unknown-linux-musl
                      arch: arm64
        steps:
            - uses: actions/checkout@v6
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
            - name: Install musl tools
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y -qq musl-tools
                  if [ "${{ matrix.arch }}" = "arm64" ]; then
                    sudo apt-get install -y -qq gcc-aarch64-linux-gnu
                    echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
                  fi
            - name: Build
              run: cargo build --release --target ${{ matrix.target }}
            - name: Rename binary
              run: cp target/${{ matrix.target }}/release/lokal lokal-linux-${{ matrix.arch }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: lokal-linux-${{ matrix.arch }}
                  path: lokal-linux-${{ matrix.arch }}

    release:
        name: Create release
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
            - uses: actions/download-artifact@v6
            - name: Create release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "${{ github.ref_name }}" \
                    lokal-linux-amd64/lokal-linux-amd64 \
                    lokal-linux-arm64/lokal-linux-arm64 \
                    scripts/bootstrap.sh \
                    --generate-notes
